# Lab 5 — Autoencoder: image embedding + audio denoising
#
# Классы — те же, что в ЛР1–4
classes: [0, 55, 58]
data_dir: "data/raw"

# -----------------------------------------------------------------------
# Part 1: Image Autoencoder (CIFAR-100)
# -----------------------------------------------------------------------
hidden_size: 512       # bottleneck = hidden_size // 8 = 64 dims
lr: 1.0e-3             # Adam LR
batch_size: 128
epochs: 200

aug_variant: "light"
aug_prob: 0.5

# Сравнение трёх размерностей скрытого пространства
hidden_variants: [128, 256, 512]   # bottleneck: 16, 32, 64

# -----------------------------------------------------------------------
# Part 2: Audio Denoising Autoencoder
# -----------------------------------------------------------------------
audio_lr: 1.0e-4
audio_epochs: 15
audio_batch_size: 128
# Ожидаемые файлы (положить в lab5/data/ или указать абсолютный путь):
audio_file: "lab5/data/audio.wav"     # очищенный сигнал
noise_file: "lab5/data/noise.wav"     # аддитивный шум
noise_scale: 0.1     # коэффициент масштабирования шума

# Сравнение ширины каналов энкодера (channels_variants)
audio_channels_variants: [[128, 256, 512], [256, 512, 1024]]
