# Lab 1 — CIFAR-100 subset MLP classification
#
# Классы выбираются по варианту:
#   Class 1 : номер группы + 7
#   Class 2 : номер варианта + 30
#   Class 3 : ИУ5 → вариант+50  |  ГУИМЦ → 90  |  Иностранцы → 93
#
# Пример из ноутбука (замените на свой вариант!):
classes: [0, 55, 58]

data_dir: "data/raw"        # путь до cifar-100-python/ от корня проекта

# Гиперпараметры — базовая конфигурация
hidden_size: 10
lr: 0.005
batch_size: 128
epochs: 250
